<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Loan Prediction Form</title>
        <link rel="stylesheet" href="../static/style.css">
    </head>
    <body>
        <div class="container">
            <h2>Loan Prediction Form</h2>

            <form action="/predict" method="POST">

                <table border="black" cellpadding="8" >

                    <tr>
                        <td> Person Age </td>
                        <td><input type="number" name="person_age" required placeholder="Enter Age"></td>
                    </tr>

                    <tr>
                        <td> Person Income </td>
                        <td><input type="number" name="person_income" required placeholder="Enter Annual Income"></td>
                    </tr>

                    <tr>
                        <td>Home Ownership</td>
                        <td>
                            <select name="person_home_ownership">
                                <option value="RENT" selected> RENT </option>
                                <option value="OWN"> OWN </option>
                                <option value="MORTGAGE"> MORTGAGE </option>
                                <option value="OTHER"> OTHER </option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td> Employment Length </td>
                        <td><input type="number" name="person_emp_length" required placeholder="Experience in years " ></td>
                    </tr>

                    <tr>
                        <td> Loan Intent </td>
                        <td>
                            <select name="loan_intent">
                                <option value="PERSONAL"> PERSONAL </option>
                                <option value="EDUCATION"> EDUCATION </option>
                                <option value="MEDICAL"> MEDICAL </option>
                                <option value="VENTURE"> VENTURE </option>
                                <option value="HOMEIMPROVEMENT"> HOME IMPROVEMENT </option>
                                <option value="DEBTCONSOLIDATION"> DEBT CONSOLIDATION </option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>Loan Grade</td>
                        <td>
                            <select name="loan_grade">
                                <option value="A"> A </option>
                                <option value="B"> B </option>
                                <option value="C"> C </option>
                                <option value="D"> D </option>
                                <option value="E"> E </option>
                                <option value="F"> F </option>
                                <option value="G"> G </option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td> Loan Amount </td>
                        <td><input type="number" name="loan_amnt" required placeholder="Enter Amount"></td>
                    </tr>

                    <tr>
                        <td> Interest Rate </td>
                        <td><input type="number" step="0.01" name="loan_int_rate" required placeholder="Enter Rate"></td>
                    </tr>

                    <tr>
                        <td> Loan Percent Income </td>
                        <td><input type="number" step="0.01" name="loan_percent_income" required placeholder="Loan/Income Ratio"></td>
                    </tr>

                    <tr>
                        <td>Previous Default</td>
                        <td>
                            <select name="cb_person_default_on_file">
                                <option value="Y"> YES </option>
                                <option value="N"> NO </option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td> Credit History Length </td>
                        <td><input type="number" name="cb_person_cred_hist_length" required placeholder="Years"></td>
                    </tr>

                </table>

                <br>
                <div class="buttons">
                    <input type="reset" value="Clear Form">
                    <input type="submit" value="Predict">
                </div>

            </form>
        </div>

    </body>
</html>
